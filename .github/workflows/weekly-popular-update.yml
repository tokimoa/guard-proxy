name: Monthly Popular Packages Update

on:
  schedule:
    - cron: "0 7 1 * *" # 1st of every month at 7:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for existing open PR
        id: check_pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:auto/popular-packages`,
            });
            core.setOutput('has_open_pr', prs.data.length > 0 ? 'true' : 'false');

      - name: Skip if PR already open
        if: steps.check_pr.outputs.has_open_pr == 'true'
        run: echo "Open popular packages PR already exists — skipping"

      - name: Update popular packages list
        if: steps.check_pr.outputs.has_open_pr != 'true'
        run: python3 scripts/update_popular_packages.py

      - name: Check for changes
        if: steps.check_pr.outputs.has_open_pr != 'true'
        id: diff
        run: |
          if git diff --quiet data/popular_packages.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - if: steps.diff.outputs.changed == 'true'
        run: uv sync --frozen && uv run pytest -q --tb=short

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/popular-packages
          commit-message: "chore: update popular packages list"
          title: "chore: monthly popular packages list update"
          body: |
            ## Popular Packages Update

            Updated `data/popular_packages.json` with the latest top packages from PyPI.

            This improves typosquatting detection accuracy by keeping the reference list current.

            All tests pass with the updated list.

            ---
            🤖 This PR was automatically created by the monthly popular packages update workflow.
          labels: maintenance
